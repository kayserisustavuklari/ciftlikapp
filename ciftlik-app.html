  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyAYRcbjfzTWKHamkNm9N6_VcYJFmwqCFcQ",
    authDomain:        "ciftlik-app-cf84c.firebaseapp.com",

<!-- Firebase SDK (CDN) -->
<script type="module">
import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult,
         signInWithPopup, signOut,
         onAuthStateChanged }                      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, query,
         orderBy, onSnapshot, addDoc,
         updateDoc, deleteDoc, doc,
         serverTimestamp }                         from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ══════════════════════════════════════
   DATA
══════════════════════════════════════ */
const BREEDS = {
  koyun:    ["Akkaraman","Morkaraman","İvesi","Merinos","Karayaka","Dağlıç","Kıvırcık","Sakız","Kangal Akkaraman","Hemşin","Çine Çaparı","Norduz","Tuj","Zom","Herik","Türk Merinosu","Ramlıç","Hampshire","Suffolk","Dorset"],
  keci:     ["Kıl Keçisi","Tiftik Keçisi (Ankara)","Saanen","Malta","Alpin","Boer","Honamlı","Abaza","Halep","Nubyan","Toggenburg","Türk Saaneni","Şami"],
  buyukbas: ["Yerli Kara","Doğu Anadolu Kırmızısı","Boz Irk","Güney Anadolu Kırmızısı","Zavot","Simental","Holstein (Siyah Alaca)","Montofon","Esmer (Brown Swiss)","Hereford","Angus","Limuzin","Charolais","Jersey","Fleckvieh","Shorthorn"]
};
const TUR_LABELS = {koyun:"Koyun",keci:"Keçi",buyukbas:"Büyükbaş"};
const TUR_EMOJI  = {koyun:"🐑",keci:"🐐",buyukbas:"🐄"};
const TUR_BG     = {koyun:"#E1F5EE",keci:"#FAEEDA",buyukbas:"#E6F1FB"};
const GIDER_CATS = ["Yem","Veteriner","İlaç / Aşı","Bakım & Temizlik","Elektrik & Su","İşçilik","Ekipman","Diğer Gider"];
const GELIR_CATS = ["Hayvan Satışı","Süt Satışı","Et Satışı","Yün / Tiftik","Gübre","Diğer Gelir"];

/* ══════════════════════════════════════
   HELPERS
══════════════════════════════════════ */
const fmt      = n  => Number(n||0).toLocaleString("tr-TR")+" ₺";
const fmtDate  = d  => { if(!d) return"-"; const p=d.split("-"); return`${p[2]}.${p[1]}.${p[0]}`; };
const daysUntil= d  => { if(!d) return 999; return Math.ceil((new Date(d)-new Date())/86400000); };
const todayStr = () => new Date().toISOString().split("T")[0];
const esc      = s  => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const calcAge  = dob=> { if(!dob) return"-"; const d=(new Date()-new Date(dob))/31536000000; return d<1?`${Math.floor(d*12)} ay`:`${Math.floor(d)} yıl`; };
const calcAgeM = dob=> { if(!dob) return 0; return (new Date()-new Date(dob))/(30.5*86400000); };

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let state = {
  user: undefined,   // undefined=loading, null=logged out
  page: "dashboard",
  animals: [], barns: [], finances: [],
  filterTur: "hepsi", filterCinsiyet: "hepsi", animalSearch: "",
  finTab: "gider", finMonth: new Date().toISOString().slice(0,7),
  modal: null,       // null | "addAnimal" | "editAnimal" | "detailAnimal" | "addBarn" | "editBarn" | "addFin"
  modalData: null,
  form: {},
  confirmDelete: null,
};

/* ══════════════════════════════════════
   FIREBASE INIT
══════════════════════════════════════ */
const app      = initializeApp(FIREBASE_CONFIG);
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();
const db       = getFirestore(app);

let unsubs = [];
const uid = () => state.user?.uid;

function subscribeToData() {
  unsubs.forEach(u=>u());
  unsubs = [];
  const sub = (col, key) => {
    const q = query(collection(db,"users",uid(),col), orderBy("createdAt","desc"));
    unsubs.push(onSnapshot(q, snap => {
      state[key] = snap.docs.map(d=>({id:d.id,...d.data()}));
      render();
    }));
  };
  sub("animals","animals");
  sub("barns","barns");
  sub("finances","finances");
}

const dbAdd    = (col,data) => addDoc(collection(db,"users",uid(),col),{...data,createdAt:serverTimestamp()});
const dbUpdate = (col,id,data) => updateDoc(doc(db,"users",uid(),col,id),data);
const dbDelete = (col,id)   => deleteDoc(doc(db,"users",uid(),col,id));

// Handle redirect result (Google sign-in redirect flow)
getRedirectResult(auth).catch(() => {});

onAuthStateChanged(auth, u => {
  state.user = u||null;
  if(u) subscribeToData();
  else { unsubs.forEach(f=>f()); state.animals=[]; state.barns=[]; state.finances=[]; }
  render();
});

/* ══════════════════════════════════════
   RENDER ENGINE
══════════════════════════════════════ */
function render() {
  const root = document.getElementById("root");
  if(state.user === undefined) { root.innerHTML = loadingHTML(); return; }
  if(!state.user) {
    root.innerHTML = loginHTML();
    document.getElementById("btn-google-login")?.addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch(e) {
        if(e.code === "auth/popup-blocked" || e.code === "auth/popup-closed-by-user" || e.code === "auth/cancelled-popup-request") {
          await signInWithRedirect(auth, provider);
        } else {
          console.error("Login error:", e.code, e.message);
        }
      }
    });
    return;
  }
  root.innerHTML = appHTML();
  attachListeners();
}

/* ── LOADING ── */
function loadingHTML() {
  return `<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a2e1f;gap:16px">
    <div style="font-size:40px">🌿</div>
    <div style="color:rgba(232,245,224,.6);font-size:14px">Yükleniyor...</div>
  </div>`;
}

/* ── LOGIN ── */
function loginHTML() {
  return `<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#0a2e1f,#0d3d28 50%,#0a2e1f);padding:24px">
    <div style="text-align:center;max-width:360px;width:100%">
      <div style="width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px">🌿</div>
      <h1 style="color:#e8f5e0;font-size:36px;font-weight:400;margin:0 0 6px;font-family:'Georgia',serif">ÇiftlikApp</h1>
      <p style="color:rgba(232,245,224,.5);font-size:14px;margin:0 0 32px">Küçükbaş & Büyükbaş Yönetim Sistemi</p>
      ${["🐑 Koyun, keçi, büyükbaş takibi","🤰 Gebelik & doğum yönetimi","💰 Yem, gider ve satış kaydı","🔔 Otomatik hatırlatıcılar"].map(t=>`
        <div style="display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.06);border:0.5px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 16px;margin-bottom:8px;text-align:left">
          <span style="font-size:18px">${t.slice(0,2)}</span>
          <span style="color:rgba(232,245,224,.8);font-size:13px">${t.slice(3)}</span>
        </div>`).join("")}
      <button id="btn-google-login" style="width:100%;padding:14px 20px;background:#fff;border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;font-size:15px;font-weight:500;margin-top:24px;box-shadow:0 4px 24px rgba(0,0,0,.3)">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google ile Giriş Yap
      </button>
      <p style="color:rgba(232,245,224,.3);font-size:11px;margin-top:16px">Verileriniz güvenle Firebase'de saklanır</p>
    </div>
  </div>`;
}

/* ── MAIN APP ── */
function appHTML() {
  const urgentCount = state.animals.filter(a=>a.gebe&&a.tahminiDogum&&daysUntil(a.tahminiDogum)<=7).length
    + state.barns.filter(b=>state.animals.filter(a=>a.ahirId===b.id).length/Math.max(b.kapasite,1)>=1).length;

  return `
  <div class="app-shell">
    <header class="app-header">
      <div>
        <div class="app-title">🌿 ÇiftlikApp</div>
        <div class="app-sub">${state.animals.length} hayvan · ${state.barns.length} ahır</div>
      </div>
      <button id="btn-logout" style="background:none;border:0.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--text-secondary);cursor:pointer">Çıkış</button>
    </header>

    <main class="app-main">
      ${state.page==="dashboard" ? dashboardHTML() : ""}
      ${state.page==="animals"   ? animalsHTML()   : ""}
      ${state.page==="barns"     ? barnsHTML()     : ""}
      ${state.page==="finance"   ? financeHTML()   : ""}
      ${state.page==="reminders" ? remindersHTML() : ""}
    </main>

    <nav class="bottom-nav">
      ${[["dashboard","📊","Özet"],["animals","🐑","Hayvanlar"],["barns","🏠","Ahırlar"],["finance","💰","Finans"],["reminders","🔔","Uyarılar"]].map(([id,ico,lbl])=>`
        <button class="nav-item${state.page===id?" active":""}" data-page="${id}">
          <span class="nav-icon">${ico}${id==="reminders"&&urgentCount>0?`<span class="nav-badge">${urgentCount}</span>`:""}</span>
          <span class="nav-label">${lbl}</span>
        </button>`).join("")}
    </nav>

    ${modalHTML()}
  </div>`;
}

/* ══════════════════════════════════════
   PAGE: DASHBOARD
══════════════════════════════════════ */
function dashboardHTML() {
  const tm   = new Date().toISOString().slice(0,7);
  const total= state.animals.length;
  const gebe = state.animals.filter(a=>a.gebe).length;
  const koyun= state.animals.filter(a=>a.tur==="koyun").length;
  const keci = state.animals.filter(a=>a.tur==="keci").length;
  const buyuk= state.animals.filter(a=>a.tur==="buyukbas").length;
  const gelir= state.finances.filter(f=>f.tip==="gelir"&&(f.tarih||"").startsWith(tm)).reduce((s,f)=>s+(f.tutar||0),0);
  const gider= state.finances.filter(f=>f.tip==="gider"&&(f.tarih||"").startsWith(tm)).reduce((s,f)=>s+(f.tutar||0),0);
  const maxT = Math.max(koyun,keci,buyuk,1);

  const yaklaşan = state.animals.filter(a=>a.gebe&&a.tahminiDogum)
    .map(a=>({...a,gun:daysUntil(a.tahminiDogum)})).filter(a=>a.gun<=60)
    .sort((a,b)=>a.gun-b.gun).slice(0,5);

  const sonIslemler = [...state.finances].sort((a,b)=>(b.tarih||"").localeCompare(a.tarih||"")).slice(0,5);

  return `<div class="page-content">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Toplam Hayvan</div><div class="stat-value">${total}</div><div class="stat-sub">${koyun}🐑 ${keci}🐐 ${buyuk}🐄</div></div>
      <div class="stat-card"><div class="stat-label">Gebe Hayvan</div><div class="stat-value" style="color:var(--pink)">${gebe}</div><div class="stat-sub">Takipte</div></div>
      <div class="stat-card"><div class="stat-label">Bu Ay Gelir</div><div class="stat-value green">${fmt(gelir)}</div></div>
      <div class="stat-card"><div class="stat-label">Bu Ay Gider</div><div class="stat-value red">${fmt(gider)}</div></div>
    </div>

    <div class="card">
      <div class="section-title">Tür Dağılımı</div>
      ${[["Koyun 🐑",koyun,"#1D9E75"],["Keçi 🐐",keci,"#EF9F27"],["Büyükbaş 🐄",buyuk,"#378ADD"]].map(([lbl,cnt,clr])=>`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:76px;font-size:12px;color:var(--text-secondary);text-align:right">${lbl}</div>
        <div style="flex:1;height:22px;background:var(--bg-secondary);border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${Math.round(cnt/maxT*100)}%;background:${clr};border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:11px;color:#fff;font-weight:500;min-width:${cnt?24:0}px">${cnt||""}</div>
        </div>
      </div>`).join("")}
    </div>

    <div class="card">
      <div class="section-title">Yaklaşan Doğumlar</div>
      ${yaklaşan.length===0?`<p class="empty-text">Yaklaşan doğum yok</p>`:yaklaşan.map(a=>`
      <div class="list-row">
        <div class="animal-avatar" style="background:${TUR_BG[a.tur]}">${TUR_EMOJI[a.tur]}</div>
        <div style="flex:1"><div class="row-title">${esc(a.kupe)}${a.isim?` · ${esc(a.isim)}`:""}</div><div class="row-sub">${fmtDate(a.tahminiDogum)} · ${a.gun>0?a.gun+" gün":"Bugün/Geçmiş"}</div></div>
        <span class="badge ${a.gun<=7?"badge-danger":a.gun<=14?"badge-warning":"badge-success"}">${a.gun<=7?"Çok Yakın":a.gun<=14?"Yakın":"Takipte"}</span>
      </div>`).join("")}
    </div>

    <div class="card">
      <div class="section-title">Son Finansal İşlemler</div>
      ${sonIslemler.length===0?`<p class="empty-text">Henüz işlem yok</p>`:sonIslemler.map(f=>`
      <div class="list-row">
        <div style="flex:1"><div class="row-title">${esc(f.kategori)}${f.aciklama?` <span style="font-weight:400;color:var(--text-secondary)">· ${esc(f.aciklama)}</span>`:""}</div><div class="row-sub">${fmtDate(f.tarih)}</div></div>
        <div style="font-weight:500;font-size:14px;color:${f.tip==="gelir"?"var(--green)":"var(--red)"}">${f.tip==="gelir"?"+":"−"}${fmt(f.tutar)}</div>
      </div>`).join("")}
    </div>
  </div>`;
}

/* ══════════════════════════════════════
   PAGE: ANIMALS
══════════════════════════════════════ */
function animalsHTML() {
  const q   = state.animalSearch.toLowerCase();
  const list= state.animals.filter(a=>{
    if(state.filterTur!=="hepsi"&&a.tur!==state.filterTur) return false;
    if(state.filterCinsiyet!=="hepsi"&&a.cinsiyet!==state.filterCinsiyet) return false;
    if(q&&!a.kupe?.toLowerCase().includes(q)&&!a.isim?.toLowerCase().includes(q)&&!a.irk?.toLowerCase().includes(q)) return false;
    return true;
  });

  return `<div class="page-content">
    <div class="card" style="padding:12px 14px">
      <input class="search-input" id="animal-search" placeholder="🔍  Küpe no, isim veya ırk ara..." value="${esc(state.animalSearch)}">
      <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
        ${["hepsi","koyun","keci","buyukbas"].map(t=>`<button class="filter-chip${state.filterTur===t?" active":""}" data-filter-tur="${t}">${t==="hepsi"?"Hepsi":`${TUR_EMOJI[t]} ${TUR_LABELS[t]}`}</button>`).join("")}
        <div style="width:100%;height:1px;background:var(--border);margin:4px 0"></div>
        ${["hepsi","disi","erkek"].map(c=>`<button class="filter-chip${state.filterCinsiyet===c?" active":""}" data-filter-cins="${c}">${c==="hepsi"?"Tüm Cinsiyetler":c==="disi"?"♀ Dişi":"♂ Erkek"}</button>`).join("")}
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;color:var(--text-secondary)">${list.length} hayvan listeleniyor</span>
      <button class="btn-primary btn-sm" id="btn-add-animal">+ Hayvan Ekle</button>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      ${list.length===0?`<p class="empty-text" style="padding:24px">Hayvan bulunamadı</p>`:list.map((a,i)=>`
      <div class="list-row clickable" data-detail-animal="${a.id}" style="border-top:${i>0?"0.5px solid var(--border)":"none"};padding:12px 16px">
        <div class="animal-avatar" style="background:${TUR_BG[a.tur]}">${TUR_EMOJI[a.tur]}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span class="row-title">${esc(a.kupe)}</span>
            ${a.isim?`<span style="font-size:12px;color:var(--text-secondary)">· ${esc(a.isim)}</span>`:""}
            ${a.gebe?`<span class="badge badge-pink">Gebe</span>`:""}
          </div>
          <div class="row-sub">${esc(a.irk||TUR_LABELS[a.tur])} · ${a.cinsiyet==="disi"?"♀ Dişi":"♂ Erkek"}${a.agirlik?` · ${a.agirlik}kg`:""}</div>
        </div>
        <span style="color:var(--text-secondary);font-size:18px">›</span>
      </div>`).join("")}
    </div>
  </div>`;
}

/* ══════════════════════════════════════
   PAGE: BARNS
══════════════════════════════════════ */
function barnsHTML() {
  return `<div class="page-content">
    <div style="display:flex;justify-content:flex-end">
      <button class="btn-primary btn-sm" id="btn-add-barn">+ Ahır Ekle</button>
    </div>

    ${state.barns.length===0?`<p class="empty-text card" style="padding:24px">Henüz ahır eklenmemiş</p>`:""}
    ${state.barns.map(b=>{
      const anims=state.animals.filter(a=>a.ahirId===b.id);
      const pct=Math.round(anims.length/Math.max(b.kapasite,1)*100);
      const barColor=pct>90?"#E24B4A":pct>70?"#EF9F27":"#1D9E75";
      const turCounts={koyun:0,keci:0,buyukbas:0};
      anims.forEach(a=>turCounts[a.tur]=(turCounts[a.tur]||0)+1);
      return `<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div><div style="font-weight:600;font-size:16px">🏠 ${esc(b.ad)}</div><div style="font-size:12px;color:var(--text-secondary);margin-top:2px">${esc(b.tur)} · Kapasite: ${b.kapasite}</div></div>
          <button class="btn-outline btn-sm" data-edit-barn="${b.id}">Düzenle</button>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
          <span style="color:var(--text-secondary)">Doluluk</span>
          <span style="font-weight:500;color:${barColor}">${anims.length}/${b.kapasite} · %${pct}</span>
        </div>
        <div style="height:8px;background:var(--bg-secondary);border-radius:4px;overflow:hidden;margin-bottom:12px">
          <div style="height:100%;width:${Math.min(pct,100)}%;background:${barColor};border-radius:4px;transition:width .4s"></div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:${b.aciklama?8:0}px">
          ${Object.entries(turCounts).filter(([,c])=>c>0).map(([t,c])=>`<span class="badge badge-neutral">${TUR_EMOJI[t]} ${c}</span>`).join("")}
        </div>
        ${b.aciklama?`<div style="font-size:12px;color:var(--text-secondary)">${esc(b.aciklama)}</div>`:""}
        <div style="margin-top:10px;border-top:0.5px solid var(--border);padding-top:10px">
          <button class="btn-danger-outline btn-sm" data-delete-barn="${b.id}">Ahırı Sil</button>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

/* ══════════════════════════════════════
   PAGE: FINANCE
══════════════════════════════════════ */
function financeHTML() {
  const tm   = new Date().toISOString().slice(0,7);
  const gelir= state.finances.filter(f=>f.tip==="gelir"&&(f.tarih||"").startsWith(tm)).reduce((s,f)=>s+(f.tutar||0),0);
  const gider= state.finances.filter(f=>f.tip==="gider"&&(f.tarih||"").startsWith(tm)).reduce((s,f)=>s+(f.tutar||0),0);
  const net  = gelir-gider;
  const yG   = state.finances.filter(f=>f.tip==="gelir").reduce((s,f)=>s+(f.tutar||0),0);
  const yD   = state.finances.filter(f=>f.tip==="gider").reduce((s,f)=>s+(f.tutar||0),0);
  const yNet = yG-yD;

  const filtered = state.finances
    .filter(f=>f.tip===state.finTab&&(!state.finMonth||(f.tarih||"").startsWith(state.finMonth)))
    .sort((a,b)=>(b.tarih||"").localeCompare(a.tarih||""));

  const catMap={};
  filtered.forEach(f=>{catMap[f.kategori]=(catMap[f.kategori]||0)+(f.tutar||0);});
  const catTotals=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);

  const months=[...new Set(state.finances.map(f=>(f.tarih||"").slice(0,7)).filter(Boolean))];
  if(!months.includes(tm)) months.push(tm);
  months.sort().reverse();

  return `<div class="page-content">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Bu Ay Net</div><div class="stat-value" style="font-size:18px;color:${net>=0?"var(--green)":"var(--red)"}">${fmt(Math.abs(net))}</div><div class="stat-sub">${net>=0?"▲ Kâr":"▼ Zarar"}</div></div>
      <div class="stat-card"><div class="stat-label">Yıllık Net</div><div class="stat-value" style="font-size:18px;color:${yNet>=0?"var(--green)":"var(--red)"}">${fmt(Math.abs(yNet))}</div><div class="stat-sub">${yNet>=0?"▲ Kâr":"▼ Zarar"}</div></div>
      <div class="stat-card"><div class="stat-label">Bu Ay Gelir</div><div class="stat-value green" style="font-size:16px">${fmt(gelir)}</div></div>
      <div class="stat-card"><div class="stat-label">Bu Ay Gider</div><div class="stat-value red" style="font-size:16px">${fmt(gider)}</div></div>
    </div>

    <div style="display:flex;gap:8px;align-items:center">
      <div class="tab-bar" style="flex:1">
        <button class="tab-btn${state.finTab==="gider"?" active":""}" data-fin-tab="gider">Giderler</button>
        <button class="tab-btn${state.finTab==="gelir"?" active":""}" data-fin-tab="gelir">Gelirler</button>
      </div>
      <button class="btn-primary btn-sm" id="btn-add-fin">+ Ekle</button>
    </div>

    <div class="card" style="padding:10px 14px">
      <label class="form-label">Ay Filtresi</label>
      <select id="fin-month-sel">
        <option value="">Tüm Zamanlar</option>
        ${months.map(m=>`<option value="${m}"${state.finMonth===m?" selected":""}>${m}</option>`).join("")}
      </select>
    </div>

    ${catTotals.length>0?`<div class="card"><div class="section-title">Kategori Dağılımı</div>${catTotals.map(([cat,total])=>{
      const max=catTotals[0][1];
      return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="width:90px;font-size:11px;color:var(--text-secondary);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(cat)}</div>
        <div style="flex:1;height:18px;background:var(--bg-secondary);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${Math.round(total/max*100)}%;background:${state.finTab==="gider"?"#E24B4A":"#1D9E75"};border-radius:3px;display:flex;align-items:center;justify-content:flex-end;padding-right:4px;font-size:10px;color:#fff;font-weight:500">${fmt(total)}</div>
        </div>
      </div>`;
    }).join("")}</div>`:""}

    <div class="card" style="padding:0">
      ${filtered.length===0?`<p class="empty-text" style="padding:20px">Bu dönemde kayıt yok</p>`:filtered.map((f,i)=>`
      <div class="list-row" style="border-top:${i>0?"0.5px solid var(--border)":"none"};padding:12px 16px">
        <div style="flex:1"><div style="font-weight:500;font-size:14px">${esc(f.kategori)}</div><div class="row-sub">${fmtDate(f.tarih)}${f.aciklama?` · ${esc(f.aciklama)}`:""}</div></div>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-weight:600;color:${f.tip==="gelir"?"var(--green)":"var(--red)"}">${f.tip==="gelir"?"+":"−"}${fmt(f.tutar)}</span>
          <button class="icon-btn" data-delete-fin="${f.id}" style="color:var(--red);opacity:.6">✕</button>
        </div>
      </div>`).join("")}
    </div>
  </div>`;
}

/* ══════════════════════════════════════

function remindersHTML() {
  const list=[];
  state.animals.filter(a=>a.gebe&&a.tahminiDogum).forEach(a=>{
    const d=daysUntil(a.tahminiDogum);
    if(d<=30) list.push({level:d<=5?"danger":d<=14?"warning":"info",icon:"🤰",title:`${a.kupe}${a.isim?" · "+a.isim:""} — Doğum Yaklaşıyor`,sub:`Tahmini: ${fmtDate(a.tahminiDogum)} · ${Math.max(0,d)} gün kaldı`,prio:d});
  });
  state.animals.filter(a=>a.gebe&&!a.tahminiDogum).forEach(a=>{
    list.push({level:"warning",icon:"📅",title:`${a.kupe} — Doğum Tarihi Girilmemiş`,sub:"Gebe işaretli ama tahmini doğum tarihi yok",prio:50});
  });
  state.barns.forEach(b=>{
    const cnt=state.animals.filter(a=>a.ahirId===b.id).length;
    const pct=cnt/Math.max(b.kapasite,1);
    if(pct>=1) list.push({level:"danger",icon:"🏠",title:`${b.ad} — Kapasite Aşıldı`,sub:`${cnt}/${b.kapasite} — Acil önlem alın`,prio:1});
    else if(pct>=.9) list.push({level:"warning",icon:"🏠",title:`${b.ad} — Kapasite Neredeyse Dolu`,sub:`${cnt}/${b.kapasite} dolu (%${Math.round(pct*100)})`,prio:10});
  });
  state.animals.filter(a=>a.cinsiyet==="disi"&&!a.agirlik).forEach(a=>{
    list.push({level:"info",icon:"⚖️",title:`${a.kupe} — Ağırlık Girilmemiş`,sub:"Büyüme takibi için ağırlık ekleyin",prio:80});
  });
  state.animals.filter(a=>{
    if(a.cinsiyet!=="disi"||a.gebe) return false;
    const m=calcAgeM(a.dogumTarihi);
    return (a.tur==="koyun"&&m>=18)||(a.tur==="keci"&&m>=15)||(a.tur==="buyukbas"&&m>=24);
  }).forEach(a=>{
    list.push({level:"info",icon:"💑",title:`${TUR_EMOJI[a.tur]} ${a.kupe} — Çiftleştirme Zamanı?`,sub:`${a.irk||a.tur} · Yetişkin dişi, henüz gebe değil`,prio:90});
  });
  state.animals.filter(a=>!a.dogumTarihi).slice(0,3).forEach(a=>{
    list.push({level:"info",icon:"🎂",title:`${a.kupe} — Doğum Tarihi Eksik`,sub:"Yaş hesabı için doğum tarihi ekleyin",prio:100});
  });
  list.sort((a,b)=>a.prio-b.prio);
  const danger=list.filter(r=>r.level==="danger").length;
  const warning=list.filter(r=>r.level==="warning").length;
  const info=list.filter(r=>r.level==="info").length;

  return `<div class="page-content">
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${danger>0?`<span class="badge badge-danger">🔴 ${danger} Kritik</span>`:""}
      ${warning>0?`<span class="badge badge-warning">🟡 ${warning} Uyarı</span>`:""}
      ${info>0?`<span class="badge badge-neutral">🔵 ${info} Bilgi</span>`:""}
      ${list.length===0?`<span class="badge badge-success">✅ Uyarı Yok</span>`:""}
    </div>
    ${list.length===0?`<div class="card" style="text-align:center;padding:32px"><div style="font-size:40px;margin-bottom:12px">✅</div><div style="font-weight:500;font-size:15px">Her şey yolunda!</div><div style="font-size:13px;color:var(--text-secondary);margin-top:6px">Şu an için uyarı bulunmuyor.</div></div>`:
    `<div class="card" style="padding:0;overflow:hidden">
      ${list.map((r,i)=>`<div style="display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-top:${i>0?"0.5px solid var(--border)":"none"};border-left:3px solid ${r.level==="danger"?"var(--red)":r.level==="warning"?"#EF9F27":"var(--blue)"}">
        <span style="font-size:20px;flex-shrink:0">${r.icon}</span>
        <div><div style="font-size:13px;font-weight:500">${esc(r.title)}</div><div style="font-size:12px;color:var(--text-secondary);margin-top:3px">${esc(r.sub)}</div></div>
      </div>`).join("")}
    </div>`}
  </div>`;
}

function modalHTML() {
  if(!state.modal) return "";
  const m=state.modal;
  const f=state.form;
  const barn= id => state.barns.find(b=>b.id===id);

  if(m==="detailAnimal") {
    const a=state.modalData;
    if(!a) return "";
    const b=barn(a.ahirId);
    return modal(`${TUR_EMOJI[a.tur]} ${esc(a.kupe)}`,`
      <div class="detail-grid">
        ${detRow("Tür",`${TUR_EMOJI[a.tur]} ${TUR_LABELS[a.tur]}`)}
        ${detRow("Irk",a.irk||"-")}
        ${detRow("Cinsiyet",a.cinsiyet==="disi"?"♀ Dişi":"♂ Erkek")}
        ${detRow("Yaş",calcAge(a.dogumTarihi))}
        ${detRow("Doğum Tarihi",fmtDate(a.dogumTarihi))}
        ${detRow("Ağırlık",a.agirlik?a.agirlik+" kg":"-")}
        ${detRow("Ahır",b?b.ad:"-")}
        ${a.anneKupe?detRow("Anne Küpe",a.anneKupe):""}
        ${a.babaKupe?detRow("Baba Küpe",a.babaKupe):""}
      </div>
      ${a.gebe?`<div class="alert alert-warning" style="margin-top:12px">🤰 Gebe — Tahmini doğum: ${fmtDate(a.tahminiDogum)}${a.tahminiDogum?` (${Math.max(0,daysUntil(a.tahminiDogum))} gün)`:""}</div>`:""}
      ${a.not?`<div class="alert alert-info" style="margin-top:8px">📝 ${esc(a.not)}</div>`:""}
    `,`<button class="btn-danger btn-sm" id="btn-modal-delete-animal">Sil</button>
       <button class="btn-outline btn-sm" id="btn-modal-edit-animal">Düzenle</button>`);
  }

  if(m==="addAnimal"||m==="editAnimal") {
    return modal(m==="addAnimal"?"Hayvan Ekle":"Hayvanı Düzenle",animalFormHTML(f),
      `<button class="btn-outline btn-sm" id="btn-modal-cancel">İptal</button>
       <button class="btn-primary btn-sm" id="btn-modal-save-animal">Kaydet</button>`);
  }

  if(m==="addBarn"||m==="editBarn") {
    return modal(m==="addBarn"?"Ahır Ekle":"Ahırı Düzenle",`
      <div class="form-group"><label class="form-label">Ahır Adı *</label><input id="f-barn-ad" value="${esc(f.ad||"")}" placeholder="Büyük Ahır, Keçi Ahırı..."></div>
      <div class="form-row-2">
        <div class="form-group"><label class="form-label">Kapasite</label><input type="number" id="f-barn-kap" value="${esc(f.kapasite||"")}" placeholder="30"></div>
        <div class="form-group"><label class="form-label">Tür</label><select id="f-barn-tur">${["Karma","Koyun","Keçi","Büyükbaş"].map(t=>`<option${(f.tur||"Karma")===t?" selected":""}>${t}</option>`).join("")}</select></div>
      </div>
      <div class="form-group"><label class="form-label">Açıklama</label><textarea id="f-barn-aciklama" rows="2" placeholder="Ek bilgi...">${esc(f.aciklama||"")}</textarea></div>
    `,`<button class="btn-outline btn-sm" id="btn-modal-cancel">İptal</button>
       <button class="btn-primary btn-sm" id="btn-modal-save-barn">Kaydet</button>`);
  }

  if(m==="addFin") {
    const cats=f.tip==="gider"?GIDER_CATS:GELIR_CATS;
    return modal("İşlem Ekle",`
      <div class="form-row-2">
        <div class="form-group"><label class="form-label">Tür</label><select id="f-fin-tip"><option value="gider"${f.tip==="gider"?" selected":""}>Gider</option><option value="gelir"${f.tip==="gelir"?" selected":""}>Gelir</option></select></div>
        <div class="form-group"><label class="form-label">Kategori</label><select id="f-fin-kat">${cats.map(c=>`<option${(f.kategori||cats[0])===c?" selected":""}>${c}</option>`).join("")}</select></div>
      </div>
      <div class="form-row-2">
        <div class="form-group"><label class="form-label">Tutar (₺) *</label><input type="number" id="f-fin-tutar" value="${f.tutar||""}" placeholder="0"></div>
        <div class="form-group"><label class="form-label">Tarih</label><input type="date" id="f-fin-tarih" value="${f.tarih||todayStr()}"></div>
      </div>
      <div class="form-group"><label class="form-label">Açıklama</label><input id="f-fin-aciklama" value="${esc(f.aciklama||"")}" placeholder="Opsiyonel..."></div>
    `,`<button class="btn-outline btn-sm" id="btn-modal-cancel">İptal</button>
       <button class="btn-primary btn-sm" id="btn-modal-save-fin">Kaydet</button>`);
  }

  if(m==="confirmDelete") {
    return modal("",`<div style="text-align:center;padding:20px 0"><div style="font-size:36px;margin-bottom:12px">⚠️</div><div style="font-size:15px;font-weight:500">${esc(state.modalData?.msg||"Silmek istiyor musunuz?")}</div><div style="font-size:13px;color:var(--text-secondary);margin-top:6px">Bu işlem geri alınamaz.</div></div>`,
      `<button class="btn-outline btn-sm" id="btn-modal-cancel">İptal</button>
       <button class="btn-danger btn-sm" id="btn-modal-confirm-delete">Evet, Sil</button>`);
  }

  return "";
}

function modal(title,body,footer) {
  return `<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      ${title?`<div class="modal-header"><span style="font-weight:600">${title}</span><button class="icon-btn" id="btn-modal-close">✕</button></div>`:""}
      <div class="modal-body">${body}</div>
      ${footer?`<div class="modal-footer">${footer}</div>`:""}
    </div>
  </div>`;
}

function detRow(label,val) {
  return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border)"><span style="font-size:13px;color:var(--text-secondary)">${label}</span><span style="font-size:13px;font-weight:500">${val}</span></div>`;
}

function animalFormHTML(f) {
  const breeds=BREEDS[f.tur||"koyun"];
  const ahirOpts=state.barns.map(b=>`<option value="${b.id}"${f.ahirId===b.id?" selected":""}>${esc(b.ad)}</option>`).join("");
  return `
    <div class="form-row-2">
      <div class="form-group"><label class="form-label">Küpe No *</label><input id="f-kupe" value="${esc(f.kupe||"")}" placeholder="TR-1234567"></div>
      <div class="form-group"><label class="form-label">İsim / Takma Ad</label><input id="f-isim" value="${esc(f.isim||"")}" placeholder="Sümbül..."></div>
    </div>
    <div class="form-row-2">
      <div class="form-group"><label class="form-label">Tür *</label><select id="f-tur"><option value="koyun"${(f.tur||"koyun")==="koyun"?" selected":""}>🐑 Koyun</option><option value="keci"${f.tur==="keci"?" selected":""}>🐐 Keçi</option><option value="buyukbas"${f.tur==="buyukbas"?" selected":""}>🐄 Büyükbaş</option></select></div>
      <div class="form-group"><label class="form-label">Irk</label><select id="f-irk"><option value="">Seçiniz</option>${breeds.map(b=>`<option${f.irk===b?" selected":""}>${b}</option>`).join("")}</select></div>
    </div>
    <div class="form-row-2">
      <div class="form-group"><label class="form-label">Cinsiyet</label><select id="f-cinsiyet"><option value="disi"${(f.cinsiyet||"disi")==="disi"?" selected":""}>♀ Dişi</option><option value="erkek"${f.cinsiyet==="erkek"?" selected":""}>♂ Erkek</option></select></div>
      <div class="form-group"><label class="form-label">Doğum Tarihi</label><input type="date" id="f-dogum" value="${f.dogumTarihi||""}"></div>
    </div>
    <div class="form-row-2">
      <div class="form-group"><label class="form-label">Ağırlık (kg)</label><input type="number" id="f-agirlik" value="${f.agirlik||""}" placeholder="0"></div>
      <div class="form-group"><label class="form-label">Ahır</label><select id="f-ahir"><option value="">Seçiniz</option>${ahirOpts}</select></div>
    </div>
    <div class="form-row-2">
      <div class="form-group"><label class="form-label">Anne Küpe No</label><input id="f-anne" value="${esc(f.anneKupe||"")}" placeholder="TR-..."></div>
      <div class="form-group"><label class="form-label">Baba Küpe No</label><input id="f-baba" value="${esc(f.babaKupe||"")}" placeholder="TR-..."></div>
    </div>
    <div class="form-group"><label class="form-label" style="display:flex;align-items:center;gap:10px"><input type="checkbox" id="f-gebe" ${f.gebe?"checked":""} style="width:auto"> Gebe</label></div>
    <div class="form-group" id="f-gebe-row" style="display:${f.gebe?"block":"none"}"><label class="form-label">Tahmini Doğum Tarihi</label><input type="date" id="f-tahmin" value="${f.tahminiDogum||""}"></div>
    <div class="form-group"><label class="form-label">Not / Sağlık Bilgisi</label><textarea id="f-not" rows="2" placeholder="Aşı notu, özel bilgi...">${esc(f.not||"")}</textarea></div>`;
}

function getAnimalForm() {
  return {
    kupe:        document.getElementById("f-kupe")?.value.trim()||"",
    isim:        document.getElementById("f-isim")?.value.trim()||"",
    tur:         document.getElementById("f-tur")?.value||"koyun",
    irk:         document.getElementById("f-irk")?.value||"",
    cinsiyet:    document.getElementById("f-cinsiyet")?.value||"disi",
    dogumTarihi: document.getElementById("f-dogum")?.value||"",
    agirlik:     parseFloat(document.getElementById("f-agirlik")?.value)||0,
    ahirId:      document.getElementById("f-ahir")?.value||"",
    anneKupe:    document.getElementById("f-anne")?.value.trim()||"",
    babaKupe:    document.getElementById("f-baba")?.value.trim()||"",
    gebe:        document.getElementById("f-gebe")?.checked||false,
    tahminiDogum:document.getElementById("f-tahmin")?.value||"",
    not:         document.getElementById("f-not")?.value.trim()||"",
  };
}

/* ══════════════════════════════════════
   EVENT LISTENERS
══════════════════════════════════════ */
function attachListeners() {
  // Nav
  document.querySelectorAll(".nav-item[data-page]").forEach(b=>{
    b.addEventListener("click",()=>{ state.page=b.dataset.page; render(); });
  });

  // Logout
  document.getElementById("btn-logout")?.addEventListener("click",()=>signOut(auth));

  // Modal close
  document.getElementById("btn-modal-close")?.addEventListener("click",closeModal);
  document.getElementById("modal-overlay")?.addEventListener("click", e=>{
    if(e.target.id==="modal-overlay") closeModal();
  });
  document.getElementById("btn-modal-cancel")?.addEventListener("click",closeModal);

  // Animals
  document.getElementById("btn-add-animal")?.addEventListener("click",()=>{
    state.modal="addAnimal"; state.form={}; render();
  });
  document.getElementById("animal-search")?.addEventListener("input",e=>{
    state.animalSearch=e.target.value; render();
  });
  document.querySelectorAll("[data-filter-tur]").forEach(b=>{
    b.addEventListener("click",()=>{ state.filterTur=b.dataset.filterTur; render(); });
  });
  document.querySelectorAll("[data-filter-cins]").forEach(b=>{
    b.addEventListener("click",()=>{ state.filterCinsiyet=b.dataset.filterCins; render(); });
  });
  document.querySelectorAll("[data-detail-animal]").forEach(b=>{
    b.addEventListener("click",()=>{
      state.modal="detailAnimal";
      state.modalData=state.animals.find(a=>a.id===b.dataset.detailAnimal);
      render();
    });
  });
  document.getElementById("btn-modal-delete-animal")?.addEventListener("click",()=>{
    const a=state.modalData;
    state.modal="confirmDelete";
    state.modalData={msg:`${a.kupe} hayvanını silmek istiyor musunuz?`,col:"animals",id:a.id};
    render();
  });
  document.getElementById("btn-modal-edit-animal")?.addEventListener("click",()=>{
    state.form={...state.modalData,gebe:!!state.modalData.gebe};
    state.modal="editAnimal"; render();
  });
  document.getElementById("btn-modal-save-animal")?.addEventListener("click", async()=>{
    const d=getAnimalForm();
    if(!d.kupe){alert("Küpe numarası zorunlu!"); return;}
    if(state.form.id) await dbUpdate("animals",state.form.id,d);
    else await dbAdd("animals",d);
    closeModal();
  });

  // Live tur change in animal form
  document.getElementById("f-tur")?.addEventListener("change",e=>{
    state.form={...getAnimalForm(),tur:e.target.value,irk:""}; render();
  });
  document.getElementById("f-gebe")?.addEventListener("change",e=>{
    document.getElementById("f-gebe-row").style.display=e.target.checked?"block":"none";
  });

  // Barns
  document.getElementById("btn-add-barn")?.addEventListener("click",()=>{
    state.modal="addBarn"; state.form={}; render();
  });
  document.querySelectorAll("[data-edit-barn]").forEach(b=>{
    b.addEventListener("click",()=>{
      const barn=state.barns.find(x=>x.id===b.dataset.editBarn);
      state.modal="editBarn"; state.form={...barn}; render();
    });
  });
  document.querySelectorAll("[data-delete-barn]").forEach(b=>{
    b.addEventListener("click",()=>{
      const barn=state.barns.find(x=>x.id===b.dataset.deleteBarn);
      state.modal="confirmDelete";
      state.modalData={msg:`"${barn?.ad}" ahırını silmek istiyor musunuz?`,col:"barns",id:b.dataset.deleteBarn};
      render();
    });
  });
  document.getElementById("btn-modal-save-barn")?.addEventListener("click",async()=>{
    const ad=document.getElementById("f-barn-ad")?.value.trim();
    if(!ad){alert("Ahır adı zorunlu!"); return;}
    const d={ad,kapasite:parseInt(document.getElementById("f-barn-kap")?.value)||20,tur:document.getElementById("f-barn-tur")?.value||"Karma",aciklama:document.getElementById("f-barn-aciklama")?.value.trim()||""};
    if(state.form.id) await dbUpdate("barns",state.form.id,d);
    else await dbAdd("barns",d);
    closeModal();
  });

  // Finance
  document.querySelectorAll("[data-fin-tab]").forEach(b=>{
    b.addEventListener("click",()=>{ state.finTab=b.dataset.finTab; render(); });
  });
  document.getElementById("fin-month-sel")?.addEventListener("change",e=>{
    state.finMonth=e.target.value; render();
  });
  document.getElementById("btn-add-fin")?.addEventListener("click",()=>{
    state.modal="addFin"; state.form={tip:"gider",kategori:"Yem",tarih:todayStr()}; render();
  });
  document.getElementById("f-fin-tip")?.addEventListener("change",e=>{
    const tip=e.target.value;
    const cats=tip==="gider"?GIDER_CATS:GELIR_CATS;
    state.form={...state.form,tip,kategori:cats[0]};
    render();
  });
  document.getElementById("btn-modal-save-fin")?.addEventListener("click",async()=>{
    const tutar=parseFloat(document.getElementById("f-fin-tutar")?.value);
    if(!tutar){alert("Tutar zorunlu!"); return;}
    await dbAdd("finances",{
      tip:document.getElementById("f-fin-tip")?.value||"gider",
      kategori:document.getElementById("f-fin-kat")?.value||"",
      tutar,
      tarih:document.getElementById("f-fin-tarih")?.value||todayStr(),
      aciklama:document.getElementById("f-fin-aciklama")?.value.trim()||"",
    });
    closeModal();
  });
  document.querySelectorAll("[data-delete-fin]").forEach(b=>{
    b.addEventListener("click",()=>{
      state.modal="confirmDelete";
      state.modalData={msg:"Bu kaydı silmek istiyor musunuz?",col:"finances",id:b.dataset.deleteFin};
      render();
    });
  });

  // Confirm delete
  document.getElementById("btn-modal-confirm-delete")?.addEventListener("click",async()=>{
    const {col,id}=state.modalData;
    await dbDelete(col,id);
    closeModal();
  });
}

function closeModal() {
  state.modal=null; state.modalData=null; render();
}
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');
:root{--green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;--red:#E24B4A;--red-light:#FBEAEA;--amber:#EF9F27;--amber-light:#FAEEDA;--blue:#378ADD;--blue-light:#E6F1FB;--pink:#C2466B;--pink-light:#FBEAF0;--bg-primary:#FFFFFF;--bg-secondary:#F4F6F3;--bg-tertiary:#ECF0EB;--text-primary:#1A2318;--text-secondary:#5A6B58;--border:rgba(26,35,24,.1);--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--shadow:0 1px 4px rgba(0,0,0,.07),0 0 0 .5px rgba(0,0,0,.06)}

.app-shell{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg-tertiary)}
.app-header{background:var(--bg-primary);border-bottom:.5px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.app-title{font-family:'DM Serif Display',Georgia,serif;font-size:18px;color:var(--text-primary);letter-spacing:-.3px}
.app-sub{font-size:11px;color:var(--text-secondary);margin-top:1px}
.app-main{flex:1;overflow-y:auto;padding-bottom:72px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg-primary);border-top:.5px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;background:none;border:none;border-top:2px solid transparent;color:var(--text-secondary);transition:all .15s}
.nav-item.active{color:var(--green);border-top-color:var(--green)}
.nav-icon{font-size:20px;position:relative;display:inline-block}
.nav-label{font-size:10px;font-weight:500}

.page-content{display:flex;flex-direction:column;gap:12px;padding:14px 12px}
.card{background:var(--bg-primary);border-radius:var(--radius-lg);border:.5px solid var(--border);padding:16px;box-shadow:var(--shadow)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{background:var(--bg-primary);border:.5px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;box-shadow:var(--shadow)}

.stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}
.stat-sub{font-size:11px;color:var(--text-secondary);margin-top:3px}
.section-title{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.list-row{display:flex;align-items:center;gap:12px;padding:10px 0}
.list-row.clickable{cursor:pointer}
.animal-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.row-title{font-size:14px;font-weight:500;color:var(--text-primary)}
.row-sub{font-size:12px;color:var(--text-secondary);margin-top:2px}
.empty-text{font-size:13px;color:var(--text-secondary);text-align:center;padding:16px 0}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.badge-success{background:#E2F4E8;color:#1A6B30}.badge-warning{background:var(--amber-light);color:#854F0B}.badge-danger{background:var(--red-light);color:#9B1C1C}.badge-info{background:var(--blue-light);color:#185FA5}.badge-pink{background:var(--pink-light);color:var(--pink)}.badge-neutral{background:var(--bg-secondary);color:var(--text-secondary);border:.5px solid var(--border)}
.alert{padding:10px 14px;border-radius:var(--radius-md);font-size:13px;display:flex;align-items:center;gap:8px}
.alert-warning{background:var(--amber-light);color:#854F0B}.alert-success{background:var(--green-light);color:var(--green-dark)}.alert-info{background:var(--blue-light);color:#185FA5}
.btn-primary{background:var(--green);color:#fff;border:none;border-radius:var(--radius-md);padding:10px 18px;font-size:14px;font-weight:500;transition:background .15s}
.btn-primary:hover{background:var(--green-dark)}
.btn-primary.btn-sm{padding:7px 14px;font-size:13px;border-radius:var(--radius-sm)}
.btn-outline{background:none;color:var(--text-primary);border:.5px solid var(--border);border-radius:var(--radius-md);padding:10px 18px;font-size:14px;transition:background .15s}

.btn-danger{background:var(--red);color:#fff;border:none;border-radius:var(--radius-md);padding:10px 18px;font-size:14px;font-weight:500}
.btn-danger.btn-sm{padding:7px 14px;font-size:13px;border-radius:var(--radius-sm)}
.btn-danger-outline{background:none;color:var(--red);border:.5px solid var(--red);border-radius:var(--radius-sm);padding:6px 12px;font-size:12px}
.icon-btn{background:none;border:none;color:var(--text-secondary);font-size:16px;padding:4px;line-height:1;border-radius:6px}
.tab-bar{display:flex;background:var(--bg-secondary);border-radius:var(--radius-md);padding:3px;gap:2px}
.tab-btn{flex:1;padding:7px 12px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:500;background:none;color:var(--text-secondary);transition:all .15s}
.tab-btn.active{background:var(--bg-primary);color:var(--text-primary);box-shadow:var(--shadow)}
.filter-chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:.5px solid var(--border);background:none;color:var(--text-secondary);transition:all .15s}
.filter-chip.active{background:var(--green);color:#fff;border-color:var(--green)}
.form-group{margin-bottom:12px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:5px}
input,select,textarea{width:100%;padding:9px 12px;border:.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--bg-primary);color:var(--text-primary);transition:border-color .15s;appearance:auto}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,.12)}
.search-input{background:var(--bg-secondary);border-color:transparent}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-primary);border-radius:var(--radius-lg) var(--radius-lg) 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.modal-header{padding:16px;border-bottom:.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg-primary);z-index:1}
.modal-body{padding:16px}
.modal-footer{padding:12px 16px;border-top:.5px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg-primary)}
.detail-grid{display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}

@supports(padding-top:env(safe-area-inset-top)){.app-header{padding-top:calc(12px + env(safe-area-inset-top))}}
</style>
</head>
