<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');
:root{--green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;--red:#E24B4A;--red-light:#FBEAEA;--amber:#EF9F27;--amber-light:#FAEEDA;--blue:#378ADD;--blue-light:#E6F1FB;--pink:#C2466B;--pink-light:#FBEAF0;--bg-primary:#FFFFFF;--bg-secondary:#F4F6F3;--bg-tertiary:#ECF0EB;--text-primary:#1A2318;--text-secondary:#5A6B58;--border:rgba(26,35,24,.1);--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--shadow:0 1px 4px rgba(0,0,0,.07),0 0 0 .5px rgba(0,0,0,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:17px;-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg-tertiary);color:var(--text-primary);line-height:1.5;-webkit-font-smoothing:antialiased}

.app-shell{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg-tertiary)}
.app-header{background:var(--bg-primary);border-bottom:.5px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}

.app-sub{font-size:11px;color:var(--text-secondary);margin-top:1px}
.app-main{flex:1;overflow-y:auto;padding-bottom:72px}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg-primary);border-top:.5px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px 7px;background:none;border:none;border-top:2px solid transparent;color:var(--text-secondary);transition:all .15s}
.nav-item.active{color:var(--green);border-top-color:var(--green)}
.nav-icon{font-size:20px;position:relative;display:inline-block}
.nav-label{font-size:10px;font-weight:500}
.nav-badge{position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.page-content{display:flex;flex-direction:column;gap:12px;padding:14px 12px}
.card{background:var(--bg-primary);border-radius:var(--radius-lg);border:.5px solid var(--border);padding:16px;box-shadow:var(--shadow)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{background:var(--bg-primary);border:.5px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;box-shadow:var(--shadow)}
.stat-label{font-size:12px;color:var(--text-secondary);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.stat-value{font-size:24px;font-weight:600;color:var(--text-primary);line-height:1.2}
.stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}
.stat-sub{font-size:11px;color:var(--text-secondary);margin-top:3px}
.section-title{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}

.list-row.clickable{cursor:pointer}

.row-title{font-size:15px;font-weight:500;color:var(--text-primary)}
.row-sub{font-size:13px;color:var(--text-secondary);margin-top:2px}
.empty-text{font-size:13px;color:var(--text-secondary);text-align:center;padding:16px 0}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.badge-success{background:#E2F4E8;color:#1A6B30}.badge-warning{background:var(--amber-light);color:#854F0B}.badge-danger{background:var(--red-light);color:#9B1C1C}.badge-info{background:var(--blue-light);color:#185FA5}.badge-pink{background:var(--pink-light);color:var(--pink)}.badge-neutral{background:var(--bg-secondary);color:var(--text-secondary);border:.5px solid var(--border)}
.alert{padding:10px 14px;border-radius:var(--radius-md);font-size:13px;display:flex;align-items:center;gap:8px}
.alert-warning{background:var(--amber-light);color:#854F0B}.alert-success{background:var(--green-light);color:var(--green-dark)}.alert-info{background:var(--blue-light);color:#185FA5}
.btn-primary{background:var(--green);color:#fff;border:none;border-radius:var(--radius-md);padding:12px 20px;font-size:15px;font-weight:500;transition:background .15s}
.btn-primary:hover{background:var(--green-dark)}
.btn-primary.btn-sm{padding:9px 16px;font-size:14px;border-radius:var(--radius-sm)}
.btn-outline{background:none;color:var(--text-primary);border:.5px solid var(--border);border-radius:var(--radius-md);padding:12px 20px;font-size:15px;transition:background .15s}
.btn-outline:hover{background:var(--bg-secondary)}
.btn-outline.btn-sm{padding:9px 16px;font-size:14px;border-radius:var(--radius-sm)}
.btn-danger{background:var(--red);color:#fff;border:none;border-radius:var(--radius-md);padding:12px 20px;font-size:15px;font-weight:500}
.btn-danger.btn-sm{padding:9px 16px;font-size:14px;border-radius:var(--radius-sm)}
.btn-danger-outline{background:none;color:var(--red);border:.5px solid var(--red);border-radius:var(--radius-sm);padding:7px 14px;font-size:13px}
.icon-btn{background:none;border:none;color:var(--text-secondary);font-size:16px;padding:4px;line-height:1;border-radius:6px}
.tab-bar{display:flex;background:var(--bg-secondary);border-radius:var(--radius-md);padding:3px;gap:2px}
.tab-btn{flex:1;padding:7px 12px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:500;background:none;color:var(--text-secondary);transition:all .15s}
.tab-btn.active{background:var(--bg-primary);color:var(--text-primary);box-shadow:var(--shadow)}
.filter-chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;border:.5px solid var(--border);background:none;color:var(--text-secondary);transition:all .15s}
.filter-chip.active{background:var(--green);color:#fff;border-color:var(--green)}
.form-group{margin-bottom:12px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:6px}
input,select,textarea{width:100%;padding:11px 14px;border:.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--bg-primary);color:var(--text-primary);transition:border-color .15s;appearance:auto}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,.12)}
.search-input{background:var(--bg-secondary);border-color:transparent}
.search-input:focus{background:var(--bg-primary)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-primary);border-radius:var(--radius-lg) var(--radius-lg) 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.modal-header{padding:16px;border-bottom:.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg-primary);z-index:1}
.modal-body{padding:16px}
.modal-footer{padding:12px 16px;border-top:.5px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg-primary)}
.det-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:.5px solid var(--border)}
.det-row span:first-child{font-size:13px;color:var(--text-secondary)}
.det-row span:last-child{font-size:13px;font-weight:500}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
@supports(padding-top:env(safe-area-inset-top)){.app-header{padding-top:calc(12px + env(safe-area-inset-top))}}
</style>

<body>
<div id="root"><div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a2e1f;gap:16px"><div style="font-size:40px">🌿</div><div style="color:rgba(232,245,224,.6);font-size:14px">Yükleniyor...</div></div></div>

<script type="module">
import { initializeApp }     from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged }
                              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, query, orderBy, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp }
                              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ── DATA ── */
const BREEDS = {
  koyun:    ["Akkaraman","Morkaraman","İvesi","Merinos","Karayaka","Dağlıç","Kıvırcık","Sakız","Kangal Akkaraman","Hemşin","Çine Çaparı","Norduz","Tuj","Zom","Herik","Türk Merinosu","Ramlıç","Hampshire","Suffolk","Dorset"],
  keci:     ["Kıl Keçisi","Tiftik Keçisi (Ankara)","Saanen","Malta","Alpin","Boer","Honamlı","Abaza","Halep","Nubyan","Toggenburg","Türk Saaneni","Şami"],
  buyukbas: ["Yerli Kara","Doğu Anadolu Kırmızısı","Boz Irk","Güney Anadolu Kırmızısı","Zavot","Simental","Holstein (Siyah Alaca)","Montofon","Esmer (Brown Swiss)","Hereford","Angus","Limuzin","Charolais","Jersey","Fleckvieh","Shorthorn"]
};
const TUR_LABELS = {koyun:"Koyun",keci:"Keçi",buyukbas:"Büyükbaş"};
const TUR_EMOJI  = {koyun:"🐑",keci:"🐐",buyukbas:"🐄"};
const TUR_BG     = {koyun:"#E1F5EE",keci:"#FAEEDA",buyukbas:"#E6F1FB"};
const GIDER_CATS = ["Yem","Veteriner","İlaç / Aşı","Bakım & Temizlik","Elektrik & Su","İşçilik","Ekipman","Diğer Gider"];
const GELIR_CATS = ["Hayvan Satışı","Süt Satışı","Et Satışı","Yün / Tiftik","Gübre","Diğer Gelir"];
const PAGES      = [["dashboard","📊","Özet"],["animals","🐑","Hayvanlar"],["barns","🏠","Ahırlar"],["finance","💰","Finans"],["reminders","🔔","Uyarılar"],["info","ℹ️","Bilgi"]];

/* ── HELPERS ── */
const fmt     = n  => Number(n||0).toLocaleString("tr-TR") + " ₺";
const fmtDate = d  => { if (!d) return "-"; const p = d.split("-"); return p[2]+"."+p[1]+"."+p[0]; };
const daysUnt = d  => { if (!d) return 999; return Math.ceil((new Date(d) - new Date()) / 86400000); };
const today   = () => new Date().toISOString().split("T")[0];
const esc     = s  => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const calcAge = d  => { if (!d) return "-"; const y=(new Date()-new Date(d))/31536000000; return y<1 ? Math.floor(y*12)+" ay" : Math.floor(y)+" yıl"; };
const ageM    = d  => { if (!d) return 0; return (new Date()-new Date(d))/(30.5*86400000); };
const el      = id => document.getElementById(id);
const mk      = (tag,attrs,text) => { const e=document.createElement(tag); Object.assign(e,attrs); if(text!==undefined) e.textContent=text; return e; };

/* ── STATE ── */
const S = {
  user: undefined, page: "dashboard",
  animals: [], barns: [], finances: [],
  filterTur: "hepsi", filterCinsiyet: "hepsi", animalSearch: "",
  finTab: "gider", finMonth: new Date().toISOString().slice(0,7),
  modal: null, modalData: null, form: {},
};

/* ── FIREBASE ── */
const app      = initializeApp(FIREBASE_CONFIG);
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();
const db       = getFirestore(app);
let   unsubs   = [];

const uid    = () => S.user && S.user.uid;
const dbAdd  = (col,d)    => addDoc(collection(db,"users",uid(),col),{...d,createdAt:serverTimestamp()});
const dbUpd  = (col,id,d) => updateDoc(doc(db,"users",uid(),col,id),d);
const dbDel  = (col,id)   => deleteDoc(doc(db,"users",uid(),col,id));

function subData() {
  unsubs.forEach(u=>u()); unsubs=[];
  ["animals","barns","finances"].forEach(col => {
    const q = query(collection(db,"users",uid(),col), orderBy("createdAt","desc"));
    unsubs.push(onSnapshot(q, snap => {
      S[col] = snap.docs.map(d=>({id:d.id,...d.data()}));
      render();
    }));
  });
}

getRedirectResult(auth).catch(()=>{});

onAuthStateChanged(auth, u => {
  S.user = u || null;
  if (u) subData();
  else { unsubs.forEach(f=>f()); S.animals=[]; S.barns=[]; S.finances=[]; }
  render();
});

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function render() {
  const root = el("root");
  if (!root) return;
  if (S.user === undefined) { root.innerHTML = ""; root.appendChild(loadingEl()); return; }
  if (!S.user) { root.innerHTML = ""; root.appendChild(loginEl()); return; }
  root.innerHTML = "";
  root.appendChild(appEl());
}

/* ── LOADING ── */
function loadingEl() {
  const d = mk("div",{style:"min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a2e1f;gap:16px"});
  d.append(mk("div",{style:"font-size:40px"},"🌿"), mk("div",{style:"color:rgba(232,245,224,.6);font-size:14px"},"Yükleniyor..."));
  return d;
}

/* ── LOGIN ── */
function loginEl() {
  const wrap = mk("div",{style:"min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#0a2e1f,#0d3d28 50%,#0a2e1f);padding:24px"});
  const inner = mk("div",{style:"text-align:center;max-width:360px;width:100%"});
  const logo = mk("div",{style:"width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px"},"🌿");
  const h1   = mk("h1",{style:"color:#e8f5e0;font-size:36px;font-weight:400;margin:0 0 6px;font-family:'Georgia',serif"},"ÇiftlikApp");
  const sub  = mk("p",{style:"color:rgba(232,245,224,.5);font-size:14px;margin:0 0 28px"},"Küçükbaş & Büyükbaş Yönetim Sistemi");
  inner.append(logo, h1, sub);
  [["🐑","Koyun, keçi, büyükbaş takibi"],["🤰","Gebelik & doğum yönetimi"],["💰","Yem, gider ve satış kaydı"],["🔔","Otomatik hatırlatıcılar"]].forEach(([ico,txt]) => {
    const row = mk("div",{style:"display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.06);border:.5px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 16px;margin-bottom:8px;text-align:left"});
    row.append(mk("span",{style:"font-size:18px"},ico), mk("span",{style:"color:rgba(232,245,224,.8);font-size:13px"},txt));
    inner.appendChild(row);
  });
  const btn = mk("button",{style:"width:100%;padding:14px 20px;background:#fff;border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;font-size:15px;font-weight:500;margin-top:20px;box-shadow:0 4px 24px rgba(0,0,0,.3)"});
  btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>';
  btn.appendChild(mk("span",{},"Google ile Giriş Yap"));
  btn.addEventListener("click", async () => {
    try { await signInWithPopup(auth, provider); }
    catch(e) {
      if (["auth/popup-blocked","auth/popup-closed-by-user","auth/cancelled-popup-request"].includes(e.code))
        await signInWithRedirect(auth, provider);
    }
  });
  const note = mk("p",{style:"color:rgba(232,245,224,.3);font-size:11px;margin-top:16px"},"Verileriniz güvenle Firebase'de saklanır");
  inner.append(btn, note);
  wrap.appendChild(inner);
  return wrap;
}

/* ── APP SHELL ── */
function appEl() {
  const urgentCount = S.animals.filter(a=>a.gebe&&a.tahminiDogum&&daysUnt(a.tahminiDogum)<=7).length
    + S.barns.filter(b=>S.animals.filter(a=>a.ahirId===b.id).length/Math.max(b.kapasite,1)>=1).length;

  const shell = mk("div",{className:"app-shell"});

  /* header */
  const hdr = mk("header",{className:"app-header"});
  const hdrL = mk("div",{});
  hdrL.append(mk("div",{className:"app-title"},"🌿 ÇiftlikApp"), mk("div",{className:"app-sub"}, S.animals.length+" hayvan · "+S.barns.length+" ahır"));
  const logoutBtn = mk("button",{style:"background:none;border:.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--text-secondary);cursor:pointer"},"Çıkış");
  logoutBtn.addEventListener("click", ()=>signOut(auth));
  hdr.append(hdrL, logoutBtn);

  /* main */
  const main = mk("main",{className:"app-main"});
  if (S.page==="dashboard") main.appendChild(dashboardEl());
  if (S.page==="animals")   main.appendChild(animalsEl());
  if (S.page==="barns")     main.appendChild(barnsEl());
  if (S.page==="finance")   main.appendChild(financeEl());
  if (S.page==="reminders") main.appendChild(remindersEl());
  if (S.page==="info")      main.appendChild(infoEl());

  /* bottom nav */
  const nav = mk("nav",{className:"bottom-nav"});
  PAGES.forEach(([id,ico,lbl]) => {
    const btn = mk("button",{className:"nav-item"+(S.page===id?" active":"")});
    const iconSpan = mk("span",{className:"nav-icon"},ico);
    if (id==="reminders" && urgentCount>0) {
      const badge = mk("span",{className:"nav-badge"},String(urgentCount));
      iconSpan.appendChild(badge);
    }
    btn.append(iconSpan, mk("span",{className:"nav-label"},lbl));
    btn.addEventListener("click", ()=>{ S.page=id; render(); });
    nav.appendChild(btn);
  });

  shell.append(hdr, main, nav);

  /* modal */
  const mEl = buildModal();
  if (mEl) shell.appendChild(mEl);

  return shell;
}

/* ══════════════════════════════════════
   DASHBOARD
══════════════════════════════════════ */
function dashboardEl() {
  const tm   = new Date().toISOString().slice(0,7);
  const koyun= S.animals.filter(a=>a.tur==="koyun").length;
  const keci = S.animals.filter(a=>a.tur==="keci").length;
  const buyuk= S.animals.filter(a=>a.tur==="buyukbas").length;

  /* tur chart */

  [["Koyun 🐑",koyun,"#1D9E75"],["Keçi 🐐",keci,"#EF9F27"],["Büyükbaş 🐄",buyuk,"#378ADD"]].forEach(([lbl,cnt,clr])=>{

    barWrap.appendChild(bar);
    row.append(labelEl,barWrap);

  /* yaklaşan doğumlar */

  yakCard.appendChild(mk("div",{className:"section-title"},"Yaklaşan Doğumlar"));
  const yaklaşan = S.animals.filter(a=>a.gebe&&a.tahminiDogum).map(a=>({...a,gun:daysUnt(a.tahminiDogum)})).filter(a=>a.gun<=60).sort((a,b)=>a.gun-b.gun).slice(0,5);
  if (!yaklaşan.length) { yakCard.appendChild(mk("p",{className:"empty-text"},"Yaklaşan doğum yok")); }
  else yaklaşan.forEach(a => {
    const row = mk("div",{className:"list-row"});
    const av  = mk("div",{className:"animal-avatar",style:"background:"+TUR_BG[a.tur]},TUR_EMOJI[a.tur]);
    const inf = mk("div",{style:"flex:1"});
    inf.append(mk("div",{className:"row-title"},a.kupe+(a.isim?" · "+a.isim:"")), mk("div",{className:"row-sub"},fmtDate(a.tahminiDogum)+" · "+(a.gun>0?a.gun+" gün":"Bugün/Geçmiş")));
    const badge = mk("span",{className:"badge "+(a.gun<=7?"badge-danger":a.gun<=14?"badge-warning":"badge-success")},a.gun<=7?"Çok Yakın":a.gun<=14?"Yakın":"Takipte");
    row.append(av,inf,badge);
    yakCard.appendChild(row);
  });
  wrap.appendChild(yakCard);

  /* son işlemler */
  const finCard = mk("div",{className:"card"});
  finCard.appendChild(mk("div",{className:"section-title"},"Son Finansal İşlemler"));
  const sonIslemler = [...S.finances].sort((a,b)=>(b.tarih||"").localeCompare(a.tarih||"")).slice(0,5);
  if (!sonIslemler.length) { finCard.appendChild(mk("p",{className:"empty-text"},"Henüz işlem yok")); }
  else sonIslemler.forEach(f => {
    const row = mk("div",{className:"list-row"});
    const inf = mk("div",{style:"flex:1"});
    const title = mk("div",{className:"row-title"},f.kategori+(f.aciklama?" · "+f.aciklama:""));
    inf.append(title, mk("div",{className:"row-sub"},fmtDate(f.tarih)));
    const amt = mk("div",{style:"font-weight:500;font-size:14px;color:"+(f.tip==="gelir"?"var(--green)":"var(--red)")},(f.tip==="gelir"?"+":"−")+fmt(f.tutar));
    row.append(inf,amt);
    finCard.appendChild(row);
  });
  wrap.appendChild(finCard);
  return wrap;

  const chipWrap = mk("div",{style:"display:flex;gap:6px;flex-wrap:wrap"});
  ["hepsi","koyun","keci","buyukbas"].forEach(t=>{
    const c = mk("button",{className:"filter-chip"+(S.filterTur===t?" active":"")},t==="hepsi"?"Hepsi":TUR_EMOJI[t]+" "+TUR_LABELS[t]);
    c.addEventListener("click",()=>{ S.filterTur=t; render(); });

  });
  chipWrap.appendChild(mk("div",{style:"width:100%;height:1px;background:var(--border);margin:4px 0"}));
  ["hepsi","disi","erkek"].forEach(c2=>{
    const c = mk("button",{className:"filter-chip"+(S.filterCinsiyet===c2?" active":"")},c2==="hepsi"?"Tüm Cinsiyetler":c2==="disi"?"♀ Dişi":"♂ Erkek");
    c.addEventListener("click",()=>{ S.filterCinsiyet=c2; render(); });

  addBtn.addEventListener("click",()=>{ S.modal="addAnimal"; S.form={}; render(); });
  tb.appendChild(addBtn);
  wrap.appendChild(tb);

  const listCard = mk("div",{className:"card",style:"padding:0;overflow:hidden"});
  if (!list.length) { listCard.appendChild(mk("p",{className:"empty-text",style:"padding:24px"},"Hayvan bulunamadı")); }

    const barn = S.barns.find(b=>b.id===a.ahirId);

    const inf  = mk("div",{style:"flex:1;min-width:0"});
    const titleLine = mk("div",{style:"display:flex;align-items:center;gap:6px;flex-wrap:wrap"});
    titleLine.appendChild(mk("span",{className:"row-title"},a.kupe));
    if(a.isim) titleLine.appendChild(mk("span",{style:"font-size:12px;color:var(--text-secondary)"},"· "+a.isim));
    if(a.gebe) titleLine.appendChild(mk("span",{className:"badge badge-pink"},"Gebe"));
    const subLine = mk("div",{className:"row-sub"},esc(a.irk||TUR_LABELS[a.tur])+" · "+(a.cinsiyet==="disi"?"♀ Dişi":"♂ Erkek")+(a.agirlik?" · "+a.agirlik+"kg":"")+(barn?" · "+barn.ad:""));
    inf.append(titleLine,subLine);

    card.appendChild(pctRow);
    const barWrap = mk("div",{style:"height:8px;background:var(--bg-secondary);border-radius:4px;overflow:hidden;margin-bottom:12px"});
    barWrap.appendChild(mk("div",{style:"height:100%;width:"+Math.min(pct,100)+"%;background:"+barColor+";border-radius:4px"}));

    const badges = mk("div",{style:"display:flex;gap:6px;flex-wrap:wrap;margin-bottom:"+(b.aciklama?8:0)+"px"});
    Object.entries(turCounts).filter(([,c])=>c>0).forEach(([t,c])=> badges.appendChild(mk("span",{className:"badge badge-neutral"},TUR_EMOJI[t]+" "+c)));

    card.appendChild(delRow);
    wrap.appendChild(card);
  });
  return wrap;

/* ══════════════════════════════════════
   FINANCE
══════════════════════════════════════ */
function financeEl() {
  const tm   = new Date().toISOString().slice(0,7);
  const gelir= S.finances.filter(f=>f.tip==="gelir"&&(f.tarih||"").startsWith(tm)).reduce((s,f)=>s+(f.tutar||0),0);
  const gider= S.finances.filter(f=>f.tip==="gider"&&(f.tarih||"").startsWith(tm)).reduce((s,f)=>s+(f.tutar||0),0);
  const net  = gelir-gider;
  const yG   = S.finances.filter(f=>f.tip==="gelir").reduce((s,f)=>s+(f.tutar||0),0);
  const yD   = S.finances.filter(f=>f.tip==="gider").reduce((s,f)=>s+(f.tutar||0),0);

  const wrap = mk("div",{className:"page-content"});

  /* stats */
  const grid = mk("div",{className:"stat-grid"});
  [["Bu Ay Net",fmt(Math.abs(net)),net>=0?"▲ Kâr":"▼ Zarar",net>=0?"var(--green)":"var(--red)"],
   ["Yıllık Net",fmt(Math.abs(yG-yD)),(yG-yD)>=0?"▲ Kâr":"▼ Zarar",(yG-yD)>=0?"var(--green)":"var(--red)"],
   ["Bu Ay Gelir",fmt(gelir),"","var(--green)"],["Bu Ay Gider",fmt(gider),"","var(--red)"]
  ].forEach(([label,val,sub,clr])=>{
    const c=mk("div",{className:"stat-card"});
    const v=mk("div",{className:"stat-value",style:"font-size:18px;color:"+clr},val);
    c.append(mk("div",{className:"stat-label"},label),v);
    if(sub) c.append(mk("div",{className:"stat-sub"},sub));
    grid.appendChild(c);
  });
  wrap.appendChild(grid);

  /* tab + add */
  const tbRow = mk("div",{style:"display:flex;gap:8px;align-items:center"});
  const tabBar = mk("div",{className:"tab-bar",style:"flex:1"});
  ["gider","gelir"].forEach(t=>{
    const btn = mk("button",{className:"tab-btn"+(S.finTab===t?" active":"")},t==="gider"?"Giderler":"Gelirler");
    btn.addEventListener("click",()=>{ S.finTab=t; render(); });
    tabBar.appendChild(btn);
  });
  const addBtn = mk("button",{className:"btn-primary btn-sm"},"+ Ekle");
  addBtn.addEventListener("click",()=>{ S.modal="addFin"; S.form={tip:"gider",kategori:"Yem",tarih:today()}; render(); });
  tbRow.append(tabBar,addBtn);
  wrap.appendChild(tbRow);

  /* month filter */
  const monthCard = mk("div",{className:"card",style:"padding:10px 14px"});
  monthCard.appendChild(mk("label",{className:"form-label"},"Ay Filtresi"));
  const monthSel = mk("select",{});
  const allOpt   = mk("option",{value:""},"Tüm Zamanlar");
  monthSel.appendChild(allOpt);
  const months = [...new Set(S.finances.map(f=>(f.tarih||"").slice(0,7)).filter(Boolean))];
  if (!months.includes(tm)) months.push(tm);
  months.sort().reverse().forEach(m=>{
    const opt = mk("option",{value:m},m);
    if(S.finMonth===m) opt.selected=true;
    monthSel.appendChild(opt);
  });
  monthSel.addEventListener("change",e=>{ S.finMonth=e.target.value; render(); });
  monthCard.appendChild(monthSel);
  wrap.appendChild(monthCard);

  /* category chart */
  const filtered = S.finances.filter(f=>f.tip===S.finTab&&(!S.finMonth||(f.tarih||"").startsWith(S.finMonth))).sort((a,b)=>(b.tarih||"").localeCompare(a.tarih||""));
  const catMap={};
  filtered.forEach(f=>catMap[f.kategori]=(catMap[f.kategori]||0)+(f.tutar||0));
  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  if (cats.length) {
    const catCard = mk("div",{className:"card"});
    catCard.appendChild(mk("div",{className:"section-title"},"Kategori Dağılımı"));
    const maxCat = cats[0][1];
    cats.forEach(([cat,total])=>{
      const row = mk("div",{style:"display:flex;align-items:center;gap:8px;margin-bottom:8px"});
      row.appendChild(mk("div",{style:"width:90px;font-size:11px;color:var(--text-secondary);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"},cat));
      const bw = mk("div",{style:"flex:1;height:18px;background:var(--bg-secondary);border-radius:3px;overflow:hidden"});
      bw.appendChild(mk("div",{style:"height:100%;width:"+Math.round(total/maxCat*100)+"%;background:"+(S.finTab==="gider"?"#E24B4A":"#1D9E75")+";border-radius:3px;display:flex;align-items:center;justify-content:flex-end;padding-right:4px;font-size:10px;color:#fff;font-weight:500"},fmt(total)));
      row.appendChild(bw);
      catCard.appendChild(row);
    });
    wrap.appendChild(catCard);
  }

  /* list */
  const listCard = mk("div",{className:"card",style:"padding:0"});
  if (!filtered.length) listCard.appendChild(mk("p",{className:"empty-text",style:"padding:20px"},"Bu dönemde kayıt yok"));
  else filtered.forEach((f,i)=>{
    const row = mk("div",{className:"list-row",style:"border-top:"+(i>0?"0.5px solid var(--border)":"none")+";padding:12px 16px"});
    const inf = mk("div",{style:"flex:1"});
    inf.append(mk("div",{style:"font-weight:500;font-size:14px"},f.kategori), mk("div",{className:"row-sub"},fmtDate(f.tarih)+(f.aciklama?" · "+f.aciklama:"")));
    const right = mk("div",{style:"display:flex;align-items:center;gap:10px"});
    right.appendChild(mk("span",{style:"font-weight:600;color:"+(f.tip==="gelir"?"var(--green)":"var(--red)")},(f.tip==="gelir"?"+":"−")+fmt(f.tutar)));
    const delBtn = mk("button",{className:"icon-btn",style:"color:var(--red);opacity:.6"},"✕");
    delBtn.addEventListener("click",()=>{ S.modal="confirmDelete"; S.modalData={msg:"Bu kaydı silmek istiyor musunuz?",col:"finances",id:f.id}; render(); });
    right.appendChild(delBtn);
    row.append(inf,right);
    listCard.appendChild(row);
  });
  wrap.appendChild(listCard);
  return wrap;
}

/* ══════════════════════════════════════
   REMINDERS
══════════════════════════════════════ */
function remindersEl() {
  const list=[];
  S.animals.filter(a=>a.gebe&&a.tahminiDogum).forEach(a=>{
    const d=daysUnt(a.tahminiDogum);
    if(d<=30) list.push({level:d<=5?"danger":d<=14?"warning":"info",icon:"🤰",title:a.kupe+(a.isim?" · "+a.isim:"")+" — Doğum Yaklaşıyor",sub:"Tahmini: "+fmtDate(a.tahminiDogum)+" · "+Math.max(0,d)+" gün kaldı",prio:d});
  });
  S.animals.filter(a=>a.gebe&&!a.tahminiDogum).forEach(a=>list.push({level:"warning",icon:"📅",title:a.kupe+" — Doğum Tarihi Girilmemiş",sub:"Gebe işaretli ama tahmini doğum tarihi yok",prio:50}));
  S.barns.forEach(b=>{
    const cnt=S.animals.filter(a=>a.ahirId===b.id).length, pct=cnt/Math.max(b.kapasite,1);
    if(pct>=1)  list.push({level:"danger",icon:"🏠",title:b.ad+" — Kapasite Aşıldı",sub:cnt+"/"+b.kapasite+" — Acil önlem alın",prio:1});
    else if(pct>=.9) list.push({level:"warning",icon:"🏠",title:b.ad+" — Kapasite Neredeyse Dolu",sub:cnt+"/"+b.kapasite+" dolu (%"+Math.round(pct*100)+")",prio:10});
  });
  S.animals.filter(a=>a.cinsiyet==="disi"&&!a.agirlik).forEach(a=>list.push({level:"info",icon:"⚖️",title:a.kupe+" — Ağırlık Girilmemiş",sub:"Büyüme takibi için ağırlık ekleyin",prio:80}));
  S.animals.filter(a=>{
    if(a.cinsiyet!=="disi"||a.gebe) return false;
    const m=ageM(a.dogumTarihi);
    return (a.tur==="koyun"&&m>=18)||(a.tur==="keci"&&m>=15)||(a.tur==="buyukbas"&&m>=24);
  }).forEach(a=>list.push({level:"info",icon:"💑",title:TUR_EMOJI[a.tur]+" "+a.kupe+" — Çiftleştirme Zamanı?",sub:(a.irk||a.tur)+" · Yetişkin dişi, henüz gebe değil",prio:90}));
  S.animals.filter(a=>!a.dogumTarihi).slice(0,3).forEach(a=>list.push({level:"info",icon:"🎂",title:a.kupe+" — Doğum Tarihi Eksik",sub:"Yaş hesabı için doğum tarihi ekleyin",prio:100}));
  list.sort((a,b)=>a.prio-b.prio);

  const wrap = mk("div",{className:"page-content"});
  const chips = mk("div",{style:"display:flex;gap:8px;flex-wrap:wrap"});
  const danger=list.filter(r=>r.level==="danger").length, warning=list.filter(r=>r.level==="warning").length, info=list.filter(r=>r.level==="info").length;
  if(danger)  chips.appendChild(mk("span",{className:"badge badge-danger"},"🔴 "+danger+" Kritik"));
  if(warning) chips.appendChild(mk("span",{className:"badge badge-warning"},"🟡 "+warning+" Uyarı"));
  if(info)    chips.appendChild(mk("span",{className:"badge badge-neutral"},"🔵 "+info+" Bilgi"));
  if(!list.length) chips.appendChild(mk("span",{className:"badge badge-success"},"✅ Uyarı Yok"));
  wrap.appendChild(chips);

  if (!list.length) {
    const c=mk("div",{className:"card",style:"text-align:center;padding:32px"});
    c.append(mk("div",{style:"font-size:40px;margin-bottom:12px"},"✅"), mk("div",{style:"font-weight:500;font-size:15px"},"Her şey yolunda!"), mk("div",{style:"font-size:13px;color:var(--text-secondary);margin-top:6px"},"Şu an için uyarı bulunmuyor."));
    wrap.appendChild(c);
  } else {
    const card=mk("div",{className:"card",style:"padding:0;overflow:hidden"});
    list.forEach((r,i)=>{
      const row=mk("div",{style:"display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-top:"+(i>0?"0.5px solid var(--border)":"none")+";border-left:3px solid "+(r.level==="danger"?"var(--red)":r.level==="warning"?"#EF9F27":"var(--blue)")});
      row.append(mk("span",{style:"font-size:20px;flex-shrink:0"},r.icon));
      const inf=mk("div",{});
      inf.append(mk("div",{style:"font-size:13px;font-weight:500"},r.title), mk("div",{style:"font-size:12px;color:var(--text-secondary);margin-top:3px"},r.sub));
      row.appendChild(inf);
      card.appendChild(row);
    });
    wrap.appendChild(card);
  }
  return wrap;
}

/* ══════════════════════════════════════
   BACKUP
══════════════════════════════════════ */
function downloadBackup() {
  const data = {version:"1.0.0",exportDate:new Date().toISOString(),animals:S.animals,barns:S.barns,finances:S.finances};
  const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href=url; a.download="ciftlikapp-yedek-"+new Date().toISOString().slice(0,10)+".json"; a.click();
  URL.revokeObjectURL(url);
}

async function uploadBackup(file) {
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.animals||!data.barns||!data.finances) { alert("Geçersiz yedek dosyası!"); return; }
    if (!confirm("Yedek yüklenecek:\n• "+data.animals.length+" hayvan\n• "+data.barns.length+" ahır\n• "+data.finances.length+" finansal kayıt\n\nMevcut veriler korunur. Devam edilsin mi?")) return;
    for (const a of data.animals)  { const {id,...d}=a; await dbAdd("animals",d); }
    for (const b of data.barns)    { const {id,...d}=b; await dbAdd("barns",d); }
    for (const f of data.finances) { const {id,...d}=f; await dbAdd("finances",d); }
    alert("✅ Yedek başarıyla yüklendi!");
  } catch(e) {
    alert("Yedek yüklenemedi: "+e.message);
  }
}

/* ══════════════════════════════════════
   MODAL BUILDER
══════════════════════════════════════ */
function buildModal() {
  const m = S.modal;
  if (!m) return null;

  const overlay = mk("div",{className:"modal-overlay"});
  overlay.addEventListener("click",e=>{ if(e.target===overlay) closeModal(); });
  const modal = mk("div",{className:"modal"});
  overlay.appendChild(modal);

  if (m==="detailAnimal") {
    const a=S.modalData; if(!a) return null;
    const barn=S.barns.find(b=>b.id===a.ahirId);
    const hdr=modalHeader(TUR_EMOJI[a.tur]+" "+a.kupe+(a.isim?" · "+a.isim:""));
    const body=mk("div",{className:"modal-body"});
    [["Tür",TUR_EMOJI[a.tur]+" "+TUR_LABELS[a.tur]],["Irk",a.irk||"-"],["Cinsiyet",a.cinsiyet==="disi"?"♀ Dişi":"♂ Erkek"],["Yaş",calcAge(a.dogumTarihi)],["Doğum Tarihi",fmtDate(a.dogumTarihi)],["Ağırlık",a.agirlik?a.agirlik+" kg":"-"],["Ahır",barn?barn.ad:"-"],...(a.anneKupe?[["Anne Küpe",a.anneKupe]]:[]),...(a.babaKupe?[["Baba Küpe",a.babaKupe]]:[])].forEach(([lbl,val])=>{
      const row=mk("div",{className:"det-row"}); row.append(mk("span",{},lbl),mk("span",{},val)); body.appendChild(row);
    });
    if(a.gebe){const al=mk("div",{className:"alert alert-warning",style:"margin-top:12px"}); al.textContent="🤰 Gebe — Tahmini doğum: "+fmtDate(a.tahminiDogum)+(a.tahminiDogum?" ("+Math.max(0,daysUnt(a.tahminiDogum))+" gün)":""); body.appendChild(al);}
    if(a.not){const al=mk("div",{className:"alert alert-info",style:"margin-top:8px"},"📝 "+a.not); body.appendChild(al);}
    const footer=mk("div",{className:"modal-footer"});
    const delBtn=mk("button",{className:"btn-danger btn-sm"},"Sil");
    delBtn.addEventListener("click",()=>{ S.modal="confirmDelete"; S.modalData={msg:a.kupe+" hayvanını silmek istiyor musunuz?",col:"animals",id:a.id}; render(); });
    const editBtn=mk("button",{className:"btn-outline btn-sm"},"Düzenle");
    editBtn.addEventListener("click",()=>{ S.form={...a,gebe:!!a.gebe}; S.modal="editAnimal"; render(); });
    footer.append(delBtn,editBtn);
    modal.append(hdr,body,footer);
  }

  else if (m==="addAnimal"||m==="editAnimal") {
    const hdr=modalHeader(m==="addAnimal"?"Hayvan Ekle":"Hayvanı Düzenle");
    const body=mk("div",{className:"modal-body"});
    body.appendChild(animalFormEl(S.form));
    const footer=mk("div",{className:"modal-footer"});
    const cancelBtn=mk("button",{className:"btn-outline btn-sm"},"İptal"); cancelBtn.addEventListener("click",closeModal);
    const saveBtn=mk("button",{className:"btn-primary btn-sm"},"Kaydet");
    saveBtn.addEventListener("click",async()=>{
      const d=getAnimalForm();
      if(!d.kupe){alert("Küpe numarası zorunlu!"); return;}
      if(S.form.id) await dbUpd("animals",S.form.id,d); else await dbAdd("animals",d);
      closeModal();
    });
    footer.append(cancelBtn,saveBtn);
    modal.append(hdr,body,footer);
  }

  else if (m==="addBarn"||m==="editBarn") {
    const hdr=modalHeader(m==="addBarn"?"Ahır Ekle":"Ahırı Düzenle");
    const body=mk("div",{className:"modal-body"});
    const f=S.form;
    [["Ahır Adı *","text","barn-ad",f.ad||"","Büyük Ahır..."]].forEach(([lbl,type,id,val,ph])=>{
      const g=mk("div",{className:"form-group"}); g.append(mk("label",{className:"form-label"},lbl));
      const inp=mk("input",{type,id:"f-"+id,value:val,placeholder:ph}); g.appendChild(inp); body.appendChild(g);
    });
    const row2=mk("div",{className:"form-row-2"});
    const g1=mk("div",{className:"form-group"}); g1.append(mk("label",{className:"form-label"},"Kapasite"));
    const kapInp=mk("input",{type:"number",id:"f-barn-kap",value:f.kapasite||"",placeholder:"30"}); g1.appendChild(kapInp); row2.appendChild(g1);
    const g2=mk("div",{className:"form-group"}); g2.append(mk("label",{className:"form-label"},"Tür"));
    const turSel=mk("select",{id:"f-barn-tur"});
    ["Karma","Koyun","Keçi","Büyükbaş"].forEach(t=>{ const o=mk("option",{},t); if((f.tur||"Karma")===t) o.selected=true; turSel.appendChild(o); });
    g2.appendChild(turSel); row2.appendChild(g2); body.appendChild(row2);
    const g3=mk("div",{className:"form-group"}); g3.append(mk("label",{className:"form-label"},"Açıklama"));
    const acTa=mk("textarea",{id:"f-barn-aciklama",rows:2,placeholder:"Ek bilgi..."}); acTa.value=f.aciklama||""; g3.appendChild(acTa); body.appendChild(g3);
    const footer=mk("div",{className:"modal-footer"});
    const cancelBtn=mk("button",{className:"btn-outline btn-sm"},"İptal"); cancelBtn.addEventListener("click",closeModal);
    const saveBtn=mk("button",{className:"btn-primary btn-sm"},"Kaydet");
    saveBtn.addEventListener("click",async()=>{
      const ad=el("f-barn-ad")?.value.trim(); if(!ad){alert("Ahır adı zorunlu!"); return;}
      const d={ad,kapasite:parseInt(el("f-barn-kap")?.value)||20,tur:el("f-barn-tur")?.value||"Karma",aciklama:el("f-barn-aciklama")?.value.trim()||""};
      if(f.id) await dbUpd("barns",f.id,d); else await dbAdd("barns",d);
      closeModal();
    });
    footer.append(cancelBtn,saveBtn);
    modal.append(hdr,body,footer);
  }

  else if (m==="addFin") {
    const hdr=modalHeader("İşlem Ekle");
    const body=mk("div",{className:"modal-body"});
    const f=S.form;
    const r1=mk("div",{className:"form-row-2"});
    const g1=mk("div",{className:"form-group"}); g1.append(mk("label",{className:"form-label"},"Tür"));
    const tipSel=mk("select",{id:"f-fin-tip"});
    ["gider","gelir"].forEach(t=>{ const o=mk("option",{value:t},t==="gider"?"Gider":"Gelir"); if(f.tip===t) o.selected=true; tipSel.appendChild(o); });
    tipSel.addEventListener("change",e=>{ S.form.tip=e.target.value; S.form.kategori=(e.target.value==="gider"?GIDER_CATS:GELIR_CATS)[0]; render(); });
    g1.appendChild(tipSel); r1.appendChild(g1);
    const g2=mk("div",{className:"form-group"}); g2.append(mk("label",{className:"form-label"},"Kategori"));
    const katSel=mk("select",{id:"f-fin-kat"});
    (f.tip==="gider"?GIDER_CATS:GELIR_CATS).forEach(c=>{ const o=mk("option",{},c); if((f.kategori||GIDER_CATS[0])===c) o.selected=true; katSel.appendChild(o); });
    g2.appendChild(katSel); r1.appendChild(g2); body.appendChild(r1);
    const r2=mk("div",{className:"form-row-2"});
    const g3=mk("div",{className:"form-group"}); g3.append(mk("label",{className:"form-label"},"Tutar (₺) *"));
    const tutInp=mk("input",{type:"number",id:"f-fin-tutar",value:f.tutar||"",placeholder:"0"}); g3.appendChild(tutInp); r2.appendChild(g3);
    const g4=mk("div",{className:"form-group"}); g4.append(mk("label",{className:"form-label"},"Tarih"));
    const tarInp=mk("input",{type:"date",id:"f-fin-tarih",value:f.tarih||today()}); g4.appendChild(tarInp); r2.appendChild(g4); body.appendChild(r2);
    const g5=mk("div",{className:"form-group"}); g5.append(mk("label",{className:"form-label"},"Açıklama"));
    const acInp=mk("input",{id:"f-fin-aciklama",value:f.aciklama||"",placeholder:"Opsiyonel..."}); g5.appendChild(acInp); body.appendChild(g5);
    const footer=mk("div",{className:"modal-footer"});
    const cancelBtn=mk("button",{className:"btn-outline btn-sm"},"İptal"); cancelBtn.addEventListener("click",closeModal);
    const saveBtn=mk("button",{className:"btn-primary btn-sm"},"Kaydet");
    saveBtn.addEventListener("click",async()=>{
      const tutar=parseFloat(el("f-fin-tutar")?.value); if(!tutar){alert("Tutar zorunlu!"); return;}
      await dbAdd("finances",{tip:el("f-fin-tip")?.value||"gider",kategori:el("f-fin-kat")?.value||"",tutar,tarih:el("f-fin-tarih")?.value||today(),aciklama:el("f-fin-aciklama")?.value.trim()||""});
      closeModal();
    });
    footer.append(cancelBtn,saveBtn);
    modal.append(hdr,body,footer);
  }

  else if (m==="confirmDelete") {
    const body=mk("div",{className:"modal-body",style:"text-align:center;padding:24px"});
    body.append(mk("div",{style:"font-size:36px;margin-bottom:12px"},"⚠️"), mk("div",{style:"font-size:15px;font-weight:500"},S.modalData?.msg||"Silmek istiyor musunuz?"), mk("div",{style:"font-size:13px;color:var(--text-secondary);margin-top:6px"},"Bu işlem geri alınamaz."));
    const footer=mk("div",{className:"modal-footer"});
    const cancelBtn=mk("button",{className:"btn-outline btn-sm"},"İptal"); cancelBtn.addEventListener("click",closeModal);
    const delBtn=mk("button",{className:"btn-danger btn-sm"},"Evet, Sil");
    delBtn.addEventListener("click",async()=>{ const {col,id}=S.modalData; await dbDel(col,id); closeModal(); });
    footer.append(cancelBtn,delBtn);
    modal.append(body,footer);
  }

  return overlay;
}

function modalHeader(title) {
  const hdr=mk("div",{className:"modal-header"});
  hdr.append(mk("span",{style:"font-weight:600"},title));
  const x=mk("button",{className:"icon-btn"},"✕"); x.addEventListener("click",closeModal);
  hdr.appendChild(x);
  return hdr;
}

function closeModal() { S.modal=null; S.modalData=null; render(); }

/* ── ANIMAL FORM ── */
function animalFormEl(f) {
  const wrap=mk("div",{});

  const r1=mk("div",{className:"form-row-2"});
  addField(r1,"Küpe No *","text","f-kupe",f.kupe||"","TR-1234567");
  addField(r1,"İsim / Takma Ad","text","f-isim",f.isim||"","Sümbül...");
  wrap.appendChild(r1);

  const r2=mk("div",{className:"form-row-2"});
  const g1=mk("div",{className:"form-group"}); g1.append(mk("label",{className:"form-label"},"Tür *"));
  const turSel=mk("select",{id:"f-tur"});
  [{v:"koyun",l:"🐑 Koyun"},{v:"keci",l:"🐐 Keçi"},{v:"buyukbas",l:"🐄 Büyükbaş"}].forEach(({v,l})=>{ const o=mk("option",{value:v},l); if((f.tur||"koyun")===v) o.selected=true; turSel.appendChild(o); });
  turSel.addEventListener("change",e=>{ S.form={...getAnimalForm(),tur:e.target.value,irk:""}; render(); });
  g1.appendChild(turSel); r2.appendChild(g1);
  const g2=mk("div",{className:"form-group"}); g2.append(mk("label",{className:"form-label"},"Irk"));
  const irkSel=mk("select",{id:"f-irk"});
  irkSel.appendChild(mk("option",{value:""},"Seçiniz"));
  BREEDS[f.tur||"koyun"].forEach(b=>{ const o=mk("option",{},b); if(f.irk===b) o.selected=true; irkSel.appendChild(o); });
  g2.appendChild(irkSel); r2.appendChild(g2); wrap.appendChild(r2);

  const r3=mk("div",{className:"form-row-2"});
  const g3=mk("div",{className:"form-group"}); g3.append(mk("label",{className:"form-label"},"Cinsiyet"));
  const cinsSel=mk("select",{id:"f-cinsiyet"});
  [{v:"disi",l:"♀ Dişi"},{v:"erkek",l:"♂ Erkek"}].forEach(({v,l})=>{ const o=mk("option",{value:v},l); if((f.cinsiyet||"disi")===v) o.selected=true; cinsSel.appendChild(o); });
  g3.appendChild(cinsSel); r3.appendChild(g3);
  addField(r3,"Doğum Tarihi","date","f-dogum",f.dogumTarihi||"","");
  wrap.appendChild(r3);

  const r4=mk("div",{className:"form-row-2"});
  addField(r4,"Ağırlık (kg)","number","f-agirlik",f.agirlik||"","0");
  const g4=mk("div",{className:"form-group"}); g4.append(mk("label",{className:"form-label"},"Ahır"));
  const ahirSel=mk("select",{id:"f-ahir"});
  ahirSel.appendChild(mk("option",{value:""},"Seçiniz"));
  S.barns.forEach(b=>{ const o=mk("option",{value:b.id},b.ad); if(f.ahirId===b.id) o.selected=true; ahirSel.appendChild(o); });
  g4.appendChild(ahirSel); r4.appendChild(g4); wrap.appendChild(r4);

  const r5=mk("div",{className:"form-row-2"});
  addField(r5,"Anne Küpe No","text","f-anne",f.anneKupe||"","TR-...");
  addField(r5,"Baba Küpe No","text","f-baba",f.babaKupe||"","TR-...");
  wrap.appendChild(r5);

  const gebeG=mk("div",{className:"form-group"});
  const gebeLbl=mk("label",{className:"form-label",style:"display:flex;align-items:center;gap:10px"});
  const gebeChk=mk("input",{type:"checkbox",id:"f-gebe",style:"width:auto"});
  if(f.gebe) gebeChk.checked=true;
  gebeLbl.append(gebeChk,mk("span",{},"Gebe"));
  gebeG.appendChild(gebeLbl); wrap.appendChild(gebeG);

  const tahminG=mk("div",{className:"form-group",id:"f-gebe-row",style:"display:"+(f.gebe?"block":"none")});
  tahminG.append(mk("label",{className:"form-label"},"Tahmini Doğum Tarihi"));
  const tahminInp=mk("input",{type:"date",id:"f-tahmin",value:f.tahminiDogum||""});
  tahminG.appendChild(tahminInp); wrap.appendChild(tahminG);
  gebeChk.addEventListener("change",e=>{ tahminG.style.display=e.target.checked?"block":"none"; });

  const notG=mk("div",{className:"form-group"}); notG.append(mk("label",{className:"form-label"},"Not / Sağlık Bilgisi"));
  const notTa=mk("textarea",{id:"f-not",rows:2,placeholder:"Aşı notu, özel bilgi..."}); notTa.value=f.not||""; notG.appendChild(notTa); wrap.appendChild(notG);
  return wrap;
}

function addField(parent,label,type,id,value,placeholder) {
  const g=mk("div",{className:"form-group"});
  g.append(mk("label",{className:"form-label"},label));
  g.appendChild(mk("input",{type,id,value:String(value),placeholder}));
  parent.appendChild(g);
}

function getAnimalForm() {
  return {
    kupe:        el("f-kupe")?.value.trim()||"",
    isim:        el("f-isim")?.value.trim()||"",
    tur:         el("f-tur")?.value||"koyun",
    irk:         el("f-irk")?.value||"",
    cinsiyet:    el("f-cinsiyet")?.value||"disi",
    dogumTarihi: el("f-dogum")?.value||"",
    agirlik:     parseFloat(el("f-agirlik")?.value)||0,
    ahirId:      el("f-ahir")?.value||"",
    anneKupe:    el("f-anne")?.value.trim()||"",
    babaKupe:    el("f-baba")?.value.trim()||"",
    gebe:        el("f-gebe")?.checked||false,
    tahminiDogum:el("f-tahmin")?.value||"",
    not:         el("f-not")?.value.trim()||"",
  };
}
